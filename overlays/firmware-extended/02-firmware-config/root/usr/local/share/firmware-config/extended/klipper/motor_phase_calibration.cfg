[motor_phase_calibration]
accel_chip: lis2dw e0_lis2dw
distance: 40
speed: 40
accel: 0
settle_time: 0.2
output_dir: /userdata/gcodes/motor_phase_data
exec_stepper: stepper_y
exec_spi_bus: spi4
exec_cs_pin: PE12
exec_partner_stepper: stepper_x
exec_partner_spi_bus: spi2
exec_partner_cs_pin: PB12
# Each motor must sync to its own electrical phase at runtime.
# A fixed cross-motor electrical phase offset is not a general CoreXY motion
# requirement, so keep the default partner offset neutral and use runtime
# overrides only for explicit experiments.
exec_partner_phase_offset: 0
exec_spi_speed: 4000000
