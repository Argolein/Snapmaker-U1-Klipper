heater_temp: 45
fan_speed: 1.0
tachometer_ppr:1

[heater_fan e3_fan]
pin: !E3:PA2
tachometer_pin: E3:PA3
heater: extruder
heater_temp: 45
fan_speed: 1.0
tachometer_ppr:1

