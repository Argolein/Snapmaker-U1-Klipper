[printer]
kinematics: cartesian
max_velocity: 200
max_accel: 1000
max_z_velocity: 30
max_z_accel: 400

# [probe]
# pin: E0:PA0
# z_offset: 0
# pulse_gpio: True
# freq_cal_mode: 1
# freq_cal_cycle: 0.001
# capture_over_cnt: 1000
# cal_time_out: 2
# trigger_freq: 925000
# report_time: 1

[eddy_current_coil extruder]
pin: E0:PA0
z_offset: 0
freq_cal_mode: 1
capture_over_cnt: 2000
cal_time_out: 2
trigger_freq: 2700000
report_time: 0.1

[eddy_current_coil extruder1]
pin: E1:PA0
z_offset: 0
freq_cal_mode: 1
capture_over_cnt: 2000
cal_time_out: 2
trigger_freq: 2700000
report_time: 0.1

[eddy_current_coil extruder2]
pin: E2:PA0
z_offset: 0
freq_cal_mode: 1
capture_over_cnt: 2000
cal_time_out: 2
trigger_freq: 2700000
report_time: 0.1

[eddy_current_coil extruder3]
pin: E3:PA0
z_offset: 0
freq_cal_mode: 1
capture_over_cnt: 2000
cal_time_out: 2
trigger_freq: 2700000
report_time: 0.1

[lis2dw]
# [lis2dw e0_lis2dw]
cs_pin: E0:PA4
# spi_bus: spi1
spi_software_miso_pin: E0:PA6
spi_software_mosi_pin: E0:PA7
spi_software_sclk_pin: E0:PA5

[lis2dw e1_lis2dw]
cs_pin: E1:PA4
# spi_bus: spi1
spi_software_miso_pin: E1:PA6
spi_software_mosi_pin: E1:PA7
spi_software_sclk_pin: E1:PA5

[lis2dw e2_lis2dw]
cs_pin: E2:PA4
# spi_bus: spi1
spi_software_miso_pin: E2:PA6
spi_software_mosi_pin: E2:PA7
spi_software_sclk_pin: E2:PA5

[lis2dw e3_lis2dw]
cs_pin: E3:PA4
# spi_bus: spi1
spi_software_miso_pin: E3:PA6
spi_software_mosi_pin: E3:PA7
spi_software_sclk_pin: E3:PA5


[stepper_x]
step_pin: PB7
dir_pin: PB6
enable_pin: !PB5
# for lead=20: rotation_distance = 200 * 16 / 160
rotation_distance: 10
microsteps: 16
# endstop_pin: PC13
endstop_pin: tmc2240_stepper_x:virtual_endstop
position_min: 0
position_endstop: 0
position_max: 200
homing_retract_dist: 0
# homing_speed: 50
# second_homing_speed: 5
# homing_retract_speed: 10
# homing_retract_dist: 5.0

[stepper_y]
step_pin: PA11
dir_pin: PA12
enable_pin: !PB5
rotation_distance: 10
microsteps: 16
# endstop_pin: PC14
endstop_pin: tmc2240_stepper_y:virtual_endstop
position_min: 0
position_endstop: 0
position_max: 200
homing_retract_dist: 0
# homing_speed: 50
# second_homing_speed: 5
# homing_retract_speed: 10
# homing_retract_dist: 5.0

[stepper_z]
step_pin: PB15
dir_pin: PA8
enable_pin: !PA15
rotation_distance: 5
microsteps: 16
# endstop_pin: PC15
endstop_pin: tmc2209_stepper_z:virtual_endstop
position_min: 0
position_endstop: 300
position_max: 300
homing_retract_dist: 0
# homing_speed: 30
# second_homing_speed: 5
# homing_retract_speed: 10
# homing_retract_dist: 10

[tmc2240 stepper_x]
uart_pin: PB3
# tx_pin: PB4
diag0_pin: ^!PC13
run_current: 1.1
hold_current: 0.3
uart_address: 0

[tmc2240 stepper_y]
uart_pin: PB8
# tx_pin: PB9
diag0_pin: ^!PC14
run_current: 1.1
hold_current: 0.3
uart_address: 0


[tmc2209 stepper_z]
uart_pin: PA10
# tx_pin: PA9
diag_pin: ^PC15
uart_address: 0
run_current: 1.1
hold_current: 0.3

[gcode_macro T0]
gcode:
  ACTIVATE_EXTRUDER EXTRUDER=extruder
  SET_GCODE_OFFSET Y=0

[gcode_macro T1]
gcode:
  ACTIVATE_EXTRUDER EXTRUDER=extruder1
  SET_GCODE_OFFSET Y=0

[gcode_macro T2]
gcode:
  ACTIVATE_EXTRUDER EXTRUDER=extruder2
  SET_GCODE_OFFSET Y=0

[gcode_macro T3]
gcode:
  ACTIVATE_EXTRUDER EXTRUDER=extruder3
  SET_GCODE_OFFSET Y=0

