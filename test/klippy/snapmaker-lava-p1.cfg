[mcu]
# serial: /dev/serial/by-id/<your-mcu-id>
serial: /dev/ttyS6
baud: 460800
restart_method: command

[mcu E0]
serial: /dev/serial/by-id/usb-Klipper_stm32f105xc_579389000000552822A77105-if00

[mcu E1]
serial: /dev/serial/by-id/usb-Klipper_stm32f105xc_589389000000552822A71505-if00

[mcu E2]
serial: /dev/serial/by-id/usb-Klipper_stm32f105xc_589389000000552822A71506-if00

[mcu E3]
serial: /dev/serial/by-id/usb-Klipper_stm32f105xc_589389000000552822A71507-if00

[virtual_sdcard]
path: /home/linaro/printer_data/gcodes
on_error_gcode: CANCEL_PRINT

[extruder]
step_pin: E0:PB13
dir_pin: E0:PB14
enable_pin: !E0:PB15
microsteps: 16
rotation_distance: 33.500
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: E0:PA8
sensor_type: Generic 3950
sensor_pin: E0:PB0
eddy_current_coil: extruder
control: watermark
min_temp: -273.15
max_temp: 999
min_extrude_temp: 0

[extruder1]
step_pin: E1:PB13
dir_pin: E1:PB14
enable_pin: !E1:PB15
microsteps: 16
rotation_distance: 33.500
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: E1:PA8
sensor_type: Generic 3950
sensor_pin: E1:PB0
eddy_current_coil: extruder1
control: watermark
min_temp: -273.15
max_temp: 999
min_extrude_temp: 0

[extruder2]
step_pin: E2:PB13
dir_pin: E2:PB14
enable_pin: !E2:PB15
microsteps: 16
rotation_distance: 33.500
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: E2:PA8
sensor_type: Generic 3950
sensor_pin: E2:PB0
eddy_current_coil: extruder2
control: watermark
min_temp: -273.15
max_temp: 999
min_extrude_temp: 0

[extruder3]
step_pin: E3:PB13
dir_pin: E3:PB14
enable_pin: !E3:PB15
microsteps: 16
rotation_distance: 33.500
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: E3:PA8
sensor_type: Generic 3950
sensor_pin: E3:PB0
eddy_current_coil: extruder3
control: watermark
min_temp: -273.15
max_temp: 999
min_extrude_temp: 0

[heater_bed]
heater_pin: PB1
sensor_type: Generic 3950
sensor_pin: PB0
control: watermark
min_temp: -273.15
max_temp: 999

[filament_switch_sensor e0_filament_sensor]
switch_pin: ~E0:PA1

[filament_switch_sensor e1_filament_sensor]
switch_pin: ~E1:PA1

[filament_switch_sensor e1_filament_sensor]
switch_pin: ~E2:PA1

[filament_switch_sensor e1_filament_sensor]
switch_pin: ~E3:PA1

[fan]
pin: !PB10
tachometer_pin: PB11

[fan_generic cavity_fan]
pin: !PB13
max_power:1.0
#shutdown_speed:
#cycle_time:
#hardware_pwm:
#kick_start_time:
#off_below:
tachometer_pin:PB14
#tachometer_ppr:
#tachometer_poll_interval:
#enable_pin:

[heater_fan e0_fan]
pin: !E0:PA2
tachometer_pin: E0:PA3
heater: extruder
heater_temp: 45
fan_speed: 1.0
tachometer_ppr:1

[heater_fan e1_fan]
pin: !E1:PA2
tachometer_pin: E1:PA3
heater: extruder
heater_temp: 45
fan_speed: 1.0
tachometer_ppr:1

[heater_fan e2_fan]
pin: !E2:PA2
tachometer_pin: E2:PA3
